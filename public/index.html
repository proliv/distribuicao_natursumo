<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Natur Sumo - Distribuição</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="theme-color" content="#FFA500">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Natur Sumo">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:          #FFA500;
      --brand-hover:    #e09400;
      --brand-dark:     #cc7a00;
      --brand-light:    #fff4e0;
      --brand-faint:    #fff9f0;
      --bg:             #f5f4f1;
      --surface:        #ffffff;
      --surface-2:      #faf9f7;
      --border:         rgba(0,0,0,0.09);
      --border-strong:  rgba(0,0,0,0.14);
      --text:           #1c1a17;
      --text-muted:     #7a7670;
      --text-faint:     #b0ada7;
      --danger:         #c0392b;
      --danger-bg:      #fdf1f0;
      --success:        #2e7d32;
      --radius-sm:      8px;
      --radius-md:      14px;
      --radius-lg:      20px;
      --shadow-sm:      0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md:      0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.05);
      --shadow-lg:      0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Inter', sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      background: var(--bg);
      font-family: var(--sans);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    #login-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      padding-bottom: calc(24px + var(--safe-bottom));
      background: var(--bg);
    }

    .login-box {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 36px 32px 32px;
      border: 1px solid var(--border);
    }

    .login-logo-wrap {
      text-align: center;
      margin-bottom: 8px;
    }

    .login-logo-wrap img {
      height: 68px;
      width: auto;
    }

    .login-sub {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 32px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 11.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      border: 1.5px solid var(--border-strong);
      background: var(--surface-2);
      padding: 13px 15px;
      font-family: var(--sans);
      font-size: 15px;
      color: var(--text);
      outline: none;
      border-radius: var(--radius-sm);
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
      -webkit-appearance: none;
    }

    .field input:focus {
      border-color: var(--brand);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(255,165,0,0.15);
    }

    .btn-primary {
      width: 100%;
      background: var(--brand);
      color: #fff;
      border: none;
      padding: 15px;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      border-radius: var(--radius-sm);
      transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
      box-shadow: 0 2px 8px rgba(255,165,0,0.35);
      letter-spacing: 0.01em;
      min-height: 52px;
    }

    .btn-primary:hover { background: var(--brand-hover); box-shadow: 0 4px 14px rgba(255,165,0,0.4); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .login-error {
      font-size: 13px;
      color: var(--danger);
      margin-top: 12px;
      text-align: center;
      display: none;
      background: var(--danger-bg);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-weight: 500;
    }

    #app-screen {
      display: none;
      width: 100%;
      min-height: 100dvh;
      flex-direction: column;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 0 var(--border), var(--shadow-sm);
    }

    .topbar-logo img {
      height: 38px;
      width: auto;
      display: block;
    }

    .btn-logout {
      background: var(--surface-2);
      border: 1.5px solid var(--border-strong);
      padding: 8px 16px;
      font-size: 13px;
      font-family: var(--sans);
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      transition: all 0.18s;
      min-height: 36px;
    }

    .btn-logout:hover { border-color: var(--brand); color: var(--brand-dark); background: var(--brand-faint); }
    .btn-logout:active { transform: scale(0.97); }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px 40px;
      padding-bottom: calc(40px + var(--safe-bottom));
      gap: 20px;
      width: 100%;
    }

    .search-section {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    .search-label {
      width: 100%;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-align: center;
      padding-left: 0;
    }

    .search-wrapper {
      width: 100%;
      display: flex;
      align-items: stretch;
      background: var(--surface);
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1.5px solid var(--border-strong);
      box-shadow: var(--shadow-sm);
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    .search-wrapper:focus-within {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(255,165,0,0.15), var(--shadow-md);
    }

    #search-input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 18px 18px 18px 26px;
      font-family: var(--mono);
      font-size: clamp(32px, 5vw, 42px);
      font-weight: 600;
      color: var(--text);
      outline: none;
      letter-spacing: -1px;
      min-width: 0;
      text-align: left;
      line-height: 1;
    }

    #search-input::placeholder {
      color: #d7d7d7;
      opacity: 1;
      text-align: left;
    }

    .search-btn {
      background: var(--brand);
      border: none;
      padding: 0 26px;
      cursor: pointer;
      color: white;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s;
      min-width: 72px;
    }

    .search-btn:hover { background: var(--brand-hover); }
    .search-btn:active { background: var(--brand-dark); }

    .result-box {
      width: 100%;
      max-width: 900px;
      display: none;
      margin-inline: auto;
    }

    .cards-row {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      align-items: center;
    }

    @media (min-width: 600px) {
      .main-content {
        padding: 48px 20px 60px;
      }

      .cards-row:not(.single) {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        align-items: stretch;
        max-width: 900px;
        margin-inline: auto;
      }

      .cards-row:not(.single) .result-card {
        flex: 1 1 260px;
        max-width: 420px;
      }

      .result-box:not(.single-box) {
        max-width: 900px;
      }
    }

    .result-card {
      width: 100%;
      max-width: 900px;
      background: var(--surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      padding: 22px 20px 20px;
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
      animation: cardIn 0.28s cubic-bezier(0.16,1,0.3,1) both;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .result-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--brand), #ffcc66);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-tag {
      font-family: var(--mono);
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-faint);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-align: center;
    }

    .result-tag::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand);
      flex-shrink: 0;
    }

    .result-name {
      font-size: 19px;
      font-weight: 700;
      margin-bottom: 5px;
      line-height: 1.25;
      color: var(--text);
      text-align: center;
    }

    .result-fat {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 18px;
      font-style: italic;
      line-height: 1.4;
      text-align: center;
    }

    .result-notes {
      width: 100%;
      font-size: 13px;
      color: #7a5a10;
      padding: 10px 13px;
      background: var(--brand-light);
      border: 1px solid rgba(255,165,0,0.18);
      border-radius: var(--radius-sm);
      margin-bottom: 18px;
      display: none;
      font-weight: 500;
      text-align: center;
    }

    .btn-maps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      background: var(--brand);
      color: white;
      text-decoration: none;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 600;
      width: 100%;
      border-radius: var(--radius-sm);
      transition: background 0.18s, box-shadow 0.18s, transform 0.1s;
      box-shadow: 0 2px 8px rgba(255,165,0,0.3);
      letter-spacing: 0.01em;
      min-height: 50px;
      text-align: center;
    }

    .btn-maps:hover { background: var(--brand-hover); box-shadow: 0 4px 14px rgba(255,165,0,0.4); }
    .btn-maps:active { transform: scale(0.98); background: var(--brand-dark); }

    .result-error {
      background: var(--danger-bg);
      border: 1px solid rgba(192,57,43,0.2);
      padding: 16px 18px;
      font-size: 14px;
      color: var(--danger);
      border-radius: var(--radius-sm);
      display: none;
      font-weight: 500;
      text-align: center;
      max-width: 480px;
      margin: 0 auto;
    }

    .footer {
      background: var(--text);
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 14px 20px;
      padding-bottom: calc(14px + var(--safe-bottom));
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .footer span {
      color: var(--brand);
      font-weight: 700;
    }

    @media (max-width: 599px) {
      .main-content {
        justify-content: center;
        align-items: center;
        padding: 24px 12px 36px;
      }

      .search-section {
        max-width: 100%;
      }

      .search-label {
        font-size: 11.5px;
        text-align: center;
      }

      #search-input {
        font-size: 34px;
        padding: 16px 14px 16px 18px;
        text-align: left;
      }

      #search-input::placeholder {
        text-align: left;
      }

      .search-btn {
        min-width: 68px;
        padding: 0 20px;
      }

      .result-box {
        max-width: 100%;
      }

      .result-card {
        padding: 20px 16px 16px;
        text-align: center;
      }

      .result-name,
      .result-fat,
      .result-tag,
      .result-notes,
      .btn-maps,
      .result-error {
        text-align: center;
      }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo-wrap">
      <img src="/logo.png" alt="Natur Sumo">
    </div>
    <div class="login-sub">Distribuição — Acesso interno</div>

    <div class="field">
      <label>Nome de utilizador</label>
      <input type="text" id="login-user" autocomplete="username">
    </div>
    <div class="field">
      <label>Palavra-passe</label>
      <input type="password" id="login-pass" autocomplete="current-password">
    </div>

    <button class="btn-primary" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">
      <img src="/logo.png" alt="Natur Sumo">
    </div>
    <button class="btn-logout" onclick="doLogout()">Sair</button>
  </div>

  <div class="main-content">
    <div class="search-section">
      <div class="search-label">Número do cliente</div>
      <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="1"
          inputmode="numeric"
          onkeydown="if(event.key==='Enter') doSearch()">
        <button class="search-btn" onclick="doSearch()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 11 22 2 13 21 11 13 3 11"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="result-box" id="result-box">
      <div class="cards-row" id="cards-row"></div>
      <div class="result-error" id="result-error"></div>
    </div>
  </div>

  <footer class="footer">
    © 2026 <span>Natur Sumo</span> — Todos os direitos reservados
  </footer>
</div>

<script>
  window.addEventListener('DOMContentLoaded', async () => {
    try {
      const res  = await fetch('/api/sessao');
      const data = await res.json();
      if (data.loggedIn) mostrarApp();
    } catch {}
  });

  async function doLogin() {
    const user = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value;
    const err  = document.getElementById('login-error');
    const btn  = document.getElementById('btn-login');

    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'A entrar...';

    try {
      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user, pass })
      });
      const data = await res.json();

      if (data.ok) {
        mostrarApp();
      } else {
        err.textContent   = data.erro || 'Credenciais incorretas.';
        err.style.display = 'block';
      }
    } catch {
      err.textContent   = 'Erro de ligação ao servidor.';
      err.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = 'Entrar';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' &&
        document.getElementById('login-screen').style.display !== 'none') {
      doLogin();
    }
  });

  function mostrarApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display  = 'flex';
    setTimeout(() => document.getElementById('search-input').focus(), 100);
  }

  async function doLogout() {
    await fetch('/api/logout', { method: 'POST' });
    document.getElementById('app-screen').style.display   = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-user').value   = '';
    document.getElementById('login-pass').value   = '';
    document.getElementById('search-input').value = '';
    document.getElementById('result-box').style.display = 'none';
    document.getElementById('cards-row').innerHTML = '';
  }

  async function doSearch() {
    const val     = document.getElementById('search-input').value.trim();
    const box     = document.getElementById('result-box');
    const row     = document.getElementById('cards-row');
    const errEl   = document.getElementById('result-error');

    box.style.display = 'block';
    row.innerHTML     = '';
    errEl.style.display = 'none';

    if (!val) {
      errEl.textContent   = 'Introduz um número de cliente.';
      errEl.style.display = 'block';
      return;
    }

    try {
      const res  = await fetch(`/api/cliente?nr=${encodeURIComponent(val)}`);
      const data = await res.json();

      if (!data.ok) {
        errEl.textContent   = data.erro;
        errEl.style.display = 'block';
        return;
      }

      const locais = data.locais;
      row.className = locais.length === 1 ? 'cards-row single' : 'cards-row';

      locais.forEach((loc, i) => {
        const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}&travelmode=driving`;

        const card = document.createElement('div');
        card.className = 'result-card';
        card.style.animationDelay = (i * 60) + 'ms';
        card.innerHTML = `
          <div class="result-tag">Cliente nº ${data.numero}${locais.length > 1 ? ' — Ponto ' + (i + 1) : ''}</div>
          <div class="result-name">${escHtml(loc.nome)}</div>
          <div class="result-fat">${escHtml(loc.fat)}</div>
          ${loc.notas ? `<div class="result-notes" style="display:block">${escHtml(loc.notas)}</div>` : ''}
          <a href="${mapsUrl}" class="btn-maps" target="_blank" rel="noopener noreferrer">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round">
              <polygon points="3 11 22 2 13 21 11 13 3 11"/>
            </svg>
            Abrir direções no Google Maps
          </a>
        `;
        row.appendChild(card);
      });

      box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    } catch {
      errEl.textContent   = 'Erro de ligação ao servidor.';
      errEl.style.display = 'block';
    }
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
  }
</script>

</body>
</html>
